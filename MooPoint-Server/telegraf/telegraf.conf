[agent]
  interval = "10s"
  round_interval = true
  omit_hostname = true
  debug = true
  quiet = false
  logfile = ""

# ====== INPUT: ALL MQTT TELEMETRY ======
# Single consumer ingests everything under moopoint/telemetry/#.
# Topic-parsing rules extract device_type / node_id / gateway_id tags and set
# the InfluxDB measurement name. A Starlark processor then cleans/renames each
# measurement before it hits InfluxDB.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt:1883"]
  username = "loracow"
  password = "loracow"
  topics = [
    "moopoint/telemetry/#"
  ]
  data_format = "json"
  tag_keys = ["_none_"]
  json_string_fields = [
    "status", "ip", "message", "request_id", "gateway_id"
  ]

  # ── Cattle tracker: 5-part position topic ──────────────────────────────────
  # moopoint/telemetry/tracker/{node_id}/position
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/tracker/+/position"
    tags  = "_/_/device_type/node_id/_"
    measurement = "_/_/_/_/position"

  # ── Cattle tracker: 6-part extended position sub-topic ─────────────────────
  # moopoint/telemetry/tracker/{node_id}/position/{sub}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/tracker/+/position/+"
    tags  = "_/_/device_type/node_id/_/_"
    measurement = "_/_/_/_/_/position"

  # ── Fence node: 5-part status topic ────────────────────────────────────────
  # moopoint/telemetry/fence/{node_id}/status
  # NOTE: fence nodes have no GPS; only batt_percent, voltage, rssi, snr.
  # Starlark renames this "status" → "fence_status" to avoid collision.
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/fence/+/status"
    tags  = "_/_/device_type/node_id/_"
    measurement = "_/_/_/_/status"

  # ── Gateway: 5-part status topic ───────────────────────────────────────────
  # moopoint/telemetry/gateway/{gateway_id}/status
  # FIX: was missing — previous fallback only handled 4-part topics.
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/gateway/+/status"
    tags  = "_/_/device_type/gateway_id/_"
    measurement = "_/_/_/_/status"

  # ── Gateway: 5-part rx_kpis topic ──────────────────────────────────────────
  # moopoint/telemetry/gateway/{gateway_id}/rx_kpis
  # FIX: was missing — previous fallback only handled 4-part topics.
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/gateway/+/rx_kpis"
    tags  = "_/_/device_type/gateway_id/_"
    measurement = "_/_/_/_/rx_kpis"

  # ── Fallback: 4-part topics (geofence status, config_ack, etc.) ────────────
  # moopoint/telemetry/{device_type}/{measurement}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "moopoint/telemetry/+/+"
    tags  = "_/_/device_type/measurement"
    measurement = "_/_/_/measurement"


# ====== PROCESSOR: ROUTE AND CLEAN METRICS ======
# Handles measurement renaming, field filtering, tag promotion, and type coercion.
[[processors.starlark]]
  source = '''
def apply(metric):
    name = metric.name
    device_type = metric.tags.get("device_type", "")

    # ── Geofence status ──────────────────────────────────────────────────────
    # Rename to avoid collision with gateway/fence "status" measurement.
    if name == "status" and device_type == "geofence":
        metric.name = "geofence_status"
        for key in ["request_id", "node_id", "message"]:
            val = metric.fields.get(key)
            if val != None:
                metric.tags[key] = str(val)
                metric.fields.pop(key)
        for key in ["status", "ip"]:
            if key in metric.fields:
                metric.fields.pop(key)
        return metric

    # ── Fence node status ────────────────────────────────────────────────────
    # Rename "status" → "fence_status" and cast numeric fields.
    # No GPS fields — position is static in Postgres.
    if name == "status" and device_type == "fence":
        metric.name = "fence_status"
        # Remove string-only fields that don't belong
        for key in ["status", "ip", "request_id", "message"]:
            if key in metric.fields:
                metric.fields.pop(key)
        # Cast float fields to int where appropriate
        int_fields = ["batt_percent", "voltage", "rssi"]
        for key in int_fields:
            val = metric.fields.get(key)
            if val != None and type(val) == "float":
                metric.fields[key] = int(val)
        # Guard: InfluxDB requires at least one field — add heartbeat if empty.
        # len() is not supported on Fields in Telegraf Starlark; iterate instead.
        has_field = False
        for _ in metric.fields:
            has_field = True
            break
        if not has_field:
            metric.fields["heartbeat"] = 1
        return metric

    # ── Gateway status ───────────────────────────────────────────────────────
    # FIX: promote string fields to tags, then add a synthetic "online" field
    # so the metric always has at least one field (InfluxDB rejects zero-field
    # points, which silently dropped all gateway status data before this fix).
    if name == "status" and device_type == "gateway":
        status_val = metric.fields.get("status")
        if status_val != None:
            metric.tags["gw_status"] = str(status_val)
            metric.fields.pop("status")
        ip_val = metric.fields.get("ip")
        if ip_val != None:
            metric.tags["gw_ip"] = str(ip_val)
            metric.fields.pop("ip")
        for key in ["request_id", "message", "gateway_id"]:
            if key in metric.fields:
                metric.fields.pop(key)
        if "node_id" in metric.fields:
            metric.fields.pop("node_id")
        # FIX: always emit at least one field so InfluxDB accepts the point.
        # "online" encodes whether the gateway reported itself alive (1) or not.
        gw_status = metric.tags.get("gw_status", "")
        metric.fields["online"] = 1 if gw_status == "online" else 0
        return metric

    # ── RX KPIs ──────────────────────────────────────────────────────────────
    if name == "rx_kpis":
        for key in ["status", "ip", "request_id", "message", "gateway_id"]:
            if key in metric.fields:
                metric.fields.pop(key)
        # Cast all numeric floats to int (except ts).
        # Collect keys first (Fields proxy doesn't support mutation during iteration).
        keys_to_check = [k for k in metric.fields]
        for key in keys_to_check:
            if key == "ts":
                continue
            val = metric.fields.get(key)
            if val != None and type(val) == "float":
                metric.fields[key] = int(val)
        has_field = False
        for _ in metric.fields:
            has_field = True
            break
        if not has_field:
            metric.fields["heartbeat"] = 1
        return metric

    # ── Tracker position ─────────────────────────────────────────────────────
    if name == "position":
        gps_valid = metric.fields.get("gps_valid")
        lat = metric.fields.get("lat")
        lon = metric.fields.get("lon")
        # Drop lat/lon if GPS is invalid or at origin (0.0, 0.0)
        if gps_valid == False or (lat == 0.0 and lon == 0.0):
            if "lat" in metric.fields:
                metric.fields.pop("lat")
            if "lon" in metric.fields:
                metric.fields.pop("lon")
        int_fields = [
            "batt", "batt_percent", "sats",
            "ext_gps_fix", "ext_gps_fail", "ext_gps_hot",
            "ext_gps_fix_time", "ext_gps_sats", "ext_tx_power",
            "ext_tracker_rssi", "ext_tracker_snr",
            "ext_power_mode", "ext_cycles",
            "ext_behavior_ruminating_s", "ext_behavior_grazing_s",
            "ext_behavior_resting_s", "ext_behavior_moving_s",
            "ext_behavior_feeding_s", "ext_behavior_confidence",
        ]
        for key in int_fields:
            val = metric.fields.get(key)
            if val != None:
                metric.fields[key] = int(val)
        # Flatten nested "ext" object if present
        ext = metric.fields.get("ext")
        if ext and type(ext) == "dict":
            for ext_key, ext_val in ext.items():
                if ext_key not in metric.fields:
                    metric.fields["ext_" + ext_key] = ext_val
            metric.fields.pop("ext")
        for key in ["status", "ip", "request_id", "message"]:
            if key in metric.fields:
                metric.fields.pop(key)
        return metric

    # ── Coverage failure points ───────────────────────────────────────────────
    if name == "coverage_point":
        metric.name = "coverage_failures"
        ft = metric.fields.get("failure_type")
        if ft != None:
            metric.tags["failure_type"] = "ack_timeout" if int(ft) == 0 else "weak_signal"
            metric.fields.pop("failure_type")
        rssi = metric.fields.get("rssi")
        if rssi != None and type(rssi) == "float":
            metric.fields["rssi"] = int(rssi)
        for key in ["status", "ip", "request_id", "message"]:
            if key in metric.fields:
                metric.fields.pop(key)
        return metric

    return metric
'''

# ====== OUTPUT: InfluxDB 2.x ======
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket       = "$INFLUXDB_BUCKET"
  timeout      = "10s"
